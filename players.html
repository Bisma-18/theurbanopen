<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players | THE URBAN OPEN</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="web3.css">
    <style>
        /* CSS Variables for Theme Switching */
        :root {
            --bg-color: #0b0e13;
            --header-bg: #000;
            --text-color: #ffffff;
            --card-bg: #111418;
            --border-color: #1a1d23;
            --accent-blue: #00d2ff;
            --win-gold: #f1c40f;
            --diamond-sparkle: linear-gradient(45deg, #b9f2ff, #ffffff, #00d2ff);
        }

        [data-theme="light"] {
            --bg-color: #f4f7f6;
            --header-bg: #ffffff;
            --text-color: #000000;
            --card-bg: #ffffff;
            --border-color: #dddddd;
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; transition: 0.3s; overflow-x: hidden; }

        .player-
        .player-header h2 { text-transform: uppercase; letter-spacing: 2px; color: var(--text-color); margin-bottom: 20px; }
        
        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .search-box {
            padding: 12px 20px;
            width: 300px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            outline: none;
        }
        .search-box:focus { border-color: var(--accent-blue); }

        .filter-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .filter-btn, .rank-select { 
            background: var(--card-bg); border: 1px solid var(--border-color); color: #888; 
            padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 0.9rem;
        }
        .filter-btn.active { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }
        .rank-select { color: var(--text-color); outline: none; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            padding: 20px 5%; 
            perspective: 1000px;
        }

        /* Flipping Animation per Requirement 5 */
        .flip-in {
            animation: flipAnimation 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes flipAnimation {
            from { transform: rotateY(90deg); opacity: 0; }
            to { transform: rotateY(0deg); opacity: 1; }
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid var(--border-color); 
            text-align: center; 
            transition: all 0.3s ease;
            position: relative;
        }

        .card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        /* Enhanced Diamond Badge per Requirement 3 */
        .diamond-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--diamond-sparkle);
            color: #000;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.65rem;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 5px #fff; }
            50% { transform: scale(1.1); box-shadow: 0 0 20px #00d2ff; }
            100% { transform: scale(1); box-shadow: 0 0 5px #fff; }
        }

        .card-img-frame { height: 230px; background: #000; border-bottom: 2px solid var(--accent-blue); }
        .card-img-frame img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body data-theme="dark">

      <header>
    <div class="logo"><h1>THE URBAN OPEN</h1></div>
    <nav>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="schedule.html">Schedule</a>
        <a href="players.html" class="active">Players</a>
        <a href="registration.html">Registration</a>
        <a href="contact.html">Contact</a>
      </div>
      <button id="theme-toggle">🌙 Dark</button>
    </nav>
  </header>

    <div class="player-header">
        <h2>ELITE PLAYERS</h2>
        
        <div class="controls-container">
            <input type="text" id="searchInput" class="search-box" placeholder="Search player by name..." oninput="applyFilters()">
            
            <div class="filter-container">
                <button class="filter-btn active" onclick="setGameFilter('All', this)">ALL GAMES</button>
                <button class="filter-btn" onclick="setGameFilter('Valorant', this)">VALORANT</button>
                <button class="filter-btn" onclick="setGameFilter('PUBG', this)">PUBG</button>
                <button class="filter-btn" onclick="setGameFilter('Fortnite', this)">FORTNITE</button>

                <select id="rankFilter" class="rank-select" onchange="applyFilters()">
                    <option value="All">All Ranks</option>
                    <option value="#1">Rank #1 (Diamond)</option>
                    <option value="Top 3">Top 3</option>
                    <option value="Top 5">Top 5</option>
                </select>
            </div>
        </div>
    </div>

    <div id="playersContainer" class="grid"></div>

    <script>
        let playersData = [];
        let currentGameFilter = 'All';
        
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            document.getElementById('theme-toggle').innerText = newTheme === 'dark' ? '☀️ Theme' : '🌙 Theme';
        }

        // Requirement 6: Continue with fetch API technique
        fetch("players.json")
            .then(res => res.json())
            .then(data => {
                playersData = data;
                displayPlayers(data);
            })
            .catch(err => console.error("Error loading players:", err));

        function setGameFilter(game, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGameFilter = game;
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const rankTerm = document.getElementById('rankFilter').value;

            const filtered = playersData.filter(p => {
                const matchesName = p.name.toLowerCase().includes(searchTerm);
                const matchesGame = (currentGameFilter === 'All' || p.game === currentGameFilter);
                
                let matchesRank = true;
                const rankNum = parseInt(p.rank.replace('#', ''));
                if (rankTerm === '#1') matchesRank = (p.rank === '#1');
                else if (rankTerm === 'Top 3') matchesRank = (rankNum <= 3);
                else if (rankTerm === 'Top 5') matchesRank = (rankNum <= 5);

                return matchesName && matchesGame && matchesRank;
            });

            displayPlayers(filtered);
        }

        function displayPlayers(players) {
            const container = document.getElementById("playersContainer");
            container.innerHTML = "";
            
            players.forEach(p => {
                const card = document.createElement("div");
                // Requirement 5: Flipping animations on updates
                card.className = "card flip-in"; 
                
                // Requirement 3: Diamond badge for top ranked player (#1)
                const badge = p.rank === "#1" ? `<div class="diamond-badge">ELITE</div>` : "";

                card.innerHTML = `
                    ${badge}
                    <div class="card-img-frame"><img src="${p.image}" alt="${p.name}"></div>
                    <div style="padding:20px;">
                        <h3 style="color:var(--win-gold); margin:0;">${p.name}</h3>
                        <p style="color:var(--accent-blue); font-weight:bold; margin:10px 0;">Rank: ${p.rank}</p>
                        <p style="font-size:0.8rem; color:#888;">${p.game.toUpperCase()}</p>
                    </div>`;
                container.appendChild(card);
            });
        }
    </script>
  <script src="theme.js"></script>
  <script src="auth.js"></script>
  <script src="nav-init.js"></script>
</body>
</html>
