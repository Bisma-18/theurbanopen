<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | The Urban Open</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="web3.css">
</head>
<body>

  <header>
    <div class="logo"><h1>THE URBAN OPEN</h1></div>
    <nav>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
      </div>
      <button id="theme-toggle">🌙 Dark</button>
    </nav>
  </header>

  <div class="auth-page-wrapper">

    <!-- Step 1: Request Reset -->
    <div class="auth-card" id="step1Card">
      <div style="font-size:2.5rem; text-align:center; margin-bottom:16px;">🔑</div>
      <h2 style="text-align:center;">Reset Password</h2>
      <p class="auth-subtitle" style="text-align:center;">Enter your email and we'll send you a reset token.</p>

      <form id="requestForm" class="decongested-form" novalidate>
        <label class="form-label">Email Address</label>
        <input type="email" id="resetEmail" placeholder="you@example.com" autocomplete="email">
        <span id="resetEmailErr" class="error"></span>
        <button type="submit" class="btn" style="width:100%; margin-top:8px;">Send Reset Token</button>
      </form>

      <div class="auth-footer">
        Remember your password? <a href="login.html">Sign in</a>
      </div>
    </div>

    <!-- Step 2: Enter Token + New Password -->
    <div class="auth-card" id="step2Card" style="display:none;">
      <div style="font-size:2.5rem; text-align:center; margin-bottom:16px;">🔓</div>
      <h2 style="text-align:center;">Enter New Password</h2>
      <p class="auth-subtitle" style="text-align:center;">
        Check the alert for your token (in production, this would arrive via email).
      </p>

      <form id="resetForm" class="decongested-form" novalidate>
        <label class="form-label">Reset Token</label>
        <input type="text" id="tokenInput" placeholder="Paste your token here" style="text-transform:uppercase; letter-spacing:2px;">
        <span id="tokenErr" class="error"></span>

        <label class="form-label">New Password</label>
        <div class="pass-wrapper">
          <input type="password" id="newPass" placeholder="New password (min 6 chars)">
          <span id="toggleNewPass" class="toggle-emoji">🙈</span>
        </div>
        <div class="strength-container"><div id="strength-bar2"></div></div>
        <span id="newPassErr" class="error"></span>

        <label class="form-label">Confirm New Password</label>
        <input type="password" id="confirmNewPass" placeholder="Confirm new password">
        <span id="confirmNewPassErr" class="error"></span>

        <button type="submit" class="btn" style="width:100%; margin-top:8px;">Set New Password</button>
      </form>
    </div>

  </div>

  <script src="theme.js"></script>
  <script src="auth.js"></script>
  <script src="nav-init.js"></script>
  <script>
    let resetEmailValue = '';

    document.getElementById('requestForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value.trim();
      document.getElementById('resetEmailErr').textContent = '';

      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        document.getElementById('resetEmailErr').textContent = 'Enter a valid email address.';
        return;
      }

      const result = Auth.requestPasswordReset(email);
      if (!result.success) {
        document.getElementById('resetEmailErr').textContent = result.error;
        return;
      }

      resetEmailValue = email;
      // In production, just show "check your email". Here we surface the token for demo.
      alert(`Demo Mode — Your reset token is:\n\n${result.token}\n\nIn production, this would be emailed to you.`);
      document.getElementById('step1Card').style.display = 'none';
      document.getElementById('step2Card').style.display = 'block';
    });

    document.getElementById('toggleNewPass').addEventListener('click', function() {
      const p = document.getElementById('newPass');
      const isPass = p.type === 'password';
      p.type = isPass ? 'text' : 'password';
      this.textContent = isPass ? '👁️' : '🙈';
    });

    document.getElementById('newPass').addEventListener('input', function() {
      const bar = document.getElementById('strength-bar2');
      bar.className = '';
      const v = this.value;
      if (!v) return;
      if (v.length < 6) bar.classList.add('weak');
      else if (v.length < 10) bar.classList.add('medium');
      else bar.classList.add('strong');
    });

    document.getElementById('resetForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const token    = document.getElementById('tokenInput').value.trim().toUpperCase();
      const newPass  = document.getElementById('newPass').value;
      const confPass = document.getElementById('confirmNewPass').value;
      let valid = true;

      document.getElementById('tokenErr').textContent = '';
      document.getElementById('newPassErr').textContent = '';
      document.getElementById('confirmNewPassErr').textContent = '';

      if (!token) { document.getElementById('tokenErr').textContent = 'Token is required.'; valid = false; }
      if (!newPass || newPass.length < 6) { document.getElementById('newPassErr').textContent = 'Password must be at least 6 characters.'; valid = false; }
      if (newPass !== confPass) { document.getElementById('confirmNewPassErr').textContent = 'Passwords do not match.'; valid = false; }
      if (!valid) return;

      const result = Auth.resetPassword(resetEmailValue, token, newPass);
      if (result.success) {
        alert('Password reset successfully! Please sign in with your new password.');
        window.location.href = 'login.html';
      } else {
        document.getElementById('tokenErr').textContent = result.error;
      }
    });
  </script>
</body>
</html>
